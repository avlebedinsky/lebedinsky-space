name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  HUSKY: '0'

jobs:
  test-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum
      - name: Run tests
        working-directory: apps/api
        env:
          TEST_DATABASE_URL: postgres://test:test@localhost:5432/test
        run: go test ./...

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
        working-directory: apps/web
      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: apps/web

  deploy:
    needs: [test-api, test-web]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ghcr.io/avlebedinsky/lebedinsky-space-web:latest

      - name: Build and push api
        uses: docker/build-push-action@v6
        with:
          context: apps/api
          push: true
          tags: ghcr.io/avlebedinsky/lebedinsky-space-api:latest

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: space
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: deploy/docker-compose.yml
          target: /opt/lebedinsky/
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_GROUP: admin
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: space
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DATABASE_URL,ADMIN_GROUP
          script: |
            printf 'DATABASE_URL=%s\nADMIN_GROUP=%s\nPORT=8080\nENVIRONMENT=production\n' \
              "$DATABASE_URL" "$ADMIN_GROUP" > /opt/lebedinsky/.env
            chmod 600 /opt/lebedinsky/.env
            docker compose -f /opt/lebedinsky/docker-compose.yml pull
            docker compose -f /opt/lebedinsky/docker-compose.yml up -d
