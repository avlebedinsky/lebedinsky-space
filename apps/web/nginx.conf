server {
    listen 80;
    server_name lebedinsky.space www.lebedinsky.space;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lebedinsky.space www.lebedinsky.space;

    # SSL (certbot заполнит автоматически)
    # ssl_certificate     /etc/letsencrypt/live/lebedinsky.space/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/lebedinsky.space/privkey.pem;

    root /var/www/lebedinsky-space/dist;
    index index.html;

    # HTTP Basic Auth
    auth_basic "Private";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
